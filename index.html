<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <title>En construcción</title>
    <style>
      :root {
        --bg-0: #070a12;
        --bg-1: #0b1020;
        --bg-2: #120c1e;
        --ink: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --muted-2: rgba(255, 255, 255, 0.55);
        --glass: rgba(255, 255, 255, 0.08);
        --stroke: rgba(255, 255, 255, 0.14);
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
        --radius: 22px;
        --accent-a: 253, 178, 198;
        --accent-b: 252, 221, 138;
        --accent-c: 124, 214, 255;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 800px at 12% 18%, rgba(var(--accent-c), 0.18), transparent 62%),
          radial-gradient(900px 700px at 85% 14%, rgba(var(--accent-a), 0.16), transparent 62%),
          radial-gradient(1100px 900px at 50% 110%, rgba(var(--accent-b), 0.14), transparent 58%),
          linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
        overflow-x: hidden;
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .card {
        width: min(980px, 100%);
        border-radius: var(--radius);
        padding: clamp(18px, 4vw, 34px);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.06));
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background:
          radial-gradient(700px 220px at 12% 0%, rgba(var(--accent-c), 0.18), transparent 60%),
          radial-gradient(700px 240px at 92% 0%, rgba(var(--accent-a), 0.16), transparent 62%),
          radial-gradient(900px 320px at 50% 120%, rgba(var(--accent-b), 0.14), transparent 58%);
        filter: blur(18px);
        opacity: 0.95;
        pointer-events: none;
      }

      .card > * {
        position: relative;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(var(--accent-b), 0.95));
        box-shadow: 0 14px 32px rgba(var(--accent-b), 0.22);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--muted);
        letter-spacing: 0.02em;
        font-weight: 700;
      }

      .pill__spark {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(var(--accent-a), 0.95));
        box-shadow: 0 14px 32px rgba(var(--accent-a), 0.22);
      }

      .main {
        margin-top: 22px;
        display: grid;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-family: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
        font-size: clamp(2.1rem, 5.8vw, 3.4rem);
        letter-spacing: -0.03em;
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: clamp(1rem, 2.4vw, 1.12rem);
        max-width: 72ch;
      }

      .row {
        margin-top: 14px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 800;
        letter-spacing: 0.02em;
        background:
          radial-gradient(90px 34px at 30% 0%, rgba(255, 255, 255, 0.2), transparent 70%),
          linear-gradient(135deg, rgba(var(--accent-c), 0.32), rgba(var(--accent-a), 0.28) 55%, rgba(var(--accent-b), 0.26));
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }

      .note {
        color: var(--muted-2);
        font-size: 0.96rem;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .bar {
        width: 130px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .bar > span {
        display: block;
        height: 100%;
        width: 48%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(var(--accent-c), 0.95), rgba(var(--accent-a), 0.9), rgba(var(--accent-b), 0.92));
        animation: move 2.6s ease-in-out infinite;
      }

      @keyframes move {
        0% {
          transform: translateX(-28%);
        }
        50% {
          transform: translateX(80%);
        }
        100% {
          transform: translateX(-28%);
        }
      }

      footer {
        margin-top: 18px;
        color: rgba(255, 255, 255, 0.44);
        font-size: 0.92rem;
      }

      @media (prefers-reduced-motion: reduce) {
        .bar > span {
          animation: none;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap" role="main">
      <section class="card" aria-label="Página en construcción">
        <div class="top">
          <div class="brand">
            <span class="dot" aria-hidden="true"></span>
            Flores Amarillas
          </div>
          <div class="pill" aria-label="Estado del sitio">
            <span class="pill__spark" aria-hidden="true"></span>
            En construcción
          </div>
        </div>

        <div class="main">
          <h1>Estamos preparando algo muy especial.</h1>
          <p>
            Este sitio está en construcción. Vuelve después para ver la versión final, hecha con cariño y con todos los detalles.
          </p>

          <div class="row" aria-label="Progreso">
            <div class="note">
              <span>Progreso</span>
              <span class="bar" aria-hidden="true"><span></span></span>
            </div>
            <a class="cta" href="javascript:location.reload()" aria-label="Volver a intentar">
              Volver después
            </a>
          </div>
        </div>

        <footer>Gracias por tu paciencia.</footer>
      </section>
    </main>
  </body>
</html>
